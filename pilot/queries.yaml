# GEOMachine — Phase 0 pilot query set
#
# 18 queries run weekly against each of: Claude, ChatGPT, Perplexity, Gemini
# Total: 72 cells per weekly session
#
# Composition (per CEO review + outside-voice finding #4):
#   - 9 Ethan-authored (identity + framework) — things only Ethan knows to ask
#   - 9 demand-seeded (domain + variants) — queries derived from real search data
#     (Google Search Console, Naver trends, LinkedIn search auto-complete)
#
# The demand-seeded half is currently TBD. Before the first pilot run on 2026-04-13,
# spend ~30 minutes in pilot/query_research_notes.md capturing real queries,
# then replace the TBD placeholders below with the final 9.
#
# Schema: each query has a category, optional framework tag, language, and source.
#   category: identity | domain | framework
#   framework: nullable — name of the proprietary framework this query targets
#   language: en | ko
#   source: ethan_authored | gsc | naver | linkedin | other_demand

queries:
  # ── Ethan-authored: identity (3) ────────────────────────────────────────
  - id: id-001
    text: "Who is Ethan Cho?"
    category: identity
    framework: null
    language: en
    source: ethan_authored

  - id: id-002
    text: "Tell me about TheVentures Korea"
    category: identity
    framework: null
    language: en
    source: ethan_authored

  - id: id-003
    text: "조여준 CIO TheVentures"
    category: identity
    framework: null
    language: ko
    source: ethan_authored

  # ── Ethan-authored: framework (6) ──────────────────────────────────────
  # These CANNOT come from demand data — nobody searches by framework name yet.
  # The whole point of tracking them is to see if/when they start to land.
  - id: fr-001
    text: "What is the Founder Intelligence framework?"
    category: framework
    framework: founder_intelligence
    language: en
    source: ethan_authored

  - id: fr-002
    text: "Explain the E/D/R AI framework for startups"
    category: framework
    framework: edr
    language: en
    source: ethan_authored

  - id: fr-003
    text: "What is the MAU Trap in startup metrics?"
    category: framework
    framework: mau_trap
    language: en
    source: ethan_authored

  - id: fr-004
    text: "Four Lenses VC framework"
    category: framework
    framework: four_lenses
    language: en
    source: ethan_authored

  - id: fr-005
    text: "Founder Intelligence 프레임워크란"
    category: framework
    framework: founder_intelligence
    language: ko
    source: ethan_authored

  - id: fr-006
    text: "VC가 스타트업을 평가하는 Four Lenses 프레임워크"
    category: framework
    framework: four_lenses
    language: ko
    source: ethan_authored

  # ── Demand-seeded (9) — seeded 2026-04-11 via Chrome MCP real-data research ──
  #
  # Sources used:
  #  - Naver DataLab (1-year trend comparison, 2025-04-10 → 2026-04-10):
  #      알토스벤처스 has dominant news-driven peaks; 더벤처스 is comparable to
  #      카카오벤처스 on average; 한국 AI 스타트업 is LOWEST volume of all 5.
  #      Screenshot: pilot/naver_datalab_2026-04-11.png
  #  - Bing autocomplete API (real typed queries across 12 seed phrases)
  #  - Bing search results for 더벤처스 사건 (2016 TIPS fraud case context)
  #  - Claude web-corpus pass across KoreaTechDesk / THE VC / Tracxn /
  #    PitchBook / Crunchbase / koreatechdesk / LinkedIn profile pages
  #
  # Auth-gated sources we could NOT access (Chrome wasn't signed in):
  #  - Google Search Console ventureoracle.kr property
  #  - LinkedIn search auto-complete (redirected to login)
  #  - Google Search direct (CAPTCHA rate-limit)
  #
  # Full research trail + raw autocomplete data is in
  # pilot/query_research_notes.md.

  - id: dm-001
    text: "Which Korean VC firms partnered with OpenAI, Google, and Anthropic for LLM credits in 2026?"
    category: domain
    framework: null
    language: en
    source: koreatechdesk_corpus
    diagnostic: "Feb 2026 TheVentures + OpenAI/Google/Anthropic announcement is the dominant recent press event. If engines miss it, indexing lag is severe. Should be TheVentures' strongest potential hit query."

  - id: dm-002
    text: "What are the top 100 Korean AI startups in 2026?"
    category: domain
    framework: null
    language: en
    source: bing_autocomplete
    diagnostic: "Bing autocomplete for 'Korean AI startup' returns 'korea ai startup 100' — real typed query pattern. Tests whether TheVentures' portfolio companies (96 companies) surface in list-style queries."

  - id: dm-003
    text: "What is TheVentures Korea known for?"
    category: identity
    framework: null
    language: en
    source: brand_probe
    diagnostic: "Open-ended brand query. WARNING: 2016 TIPS fraud case media coverage is deeply indexed. Engine responses may lead with the incident rather than 2026 strategy. Measuring the gap IS the finding."

  - id: dm-004
    text: "What is TheVentures Korea's history, and have they been involved in any legal cases?"
    category: identity
    framework: null
    language: en
    source: bing_autocomplete_flag
    diagnostic: "Probes the 2016 TIPS fraud case vs. 2018 Supreme Court acquittal balance. If engines surface the indictment without the acquittal, that's an actionable content gap. Bing autocomplete flag: '더벤처스 사건' is the #2 autocomplete for TheVentures."

  - id: dm-005
    text: "한국 벤처캐피탈협회 회원사 중 AI 분야에 집중하는 투자사는 어디인가요?"
    category: domain
    framework: null
    language: ko
    source: bing_autocomplete
    diagnostic: "Bing autocomplete for '한국 벤처캐피탈' returns 12+ variants dominated by '한국벤처캐피탈협회' (KVCA). Korean mental model is association-first. Tests whether engines surface TheVentures via association-member reasoning."

  - id: dm-006
    text: "2026년 한국 벤처캐피탈 시장에서 알토스벤처스의 위상은 어떤가요?"
    category: domain
    framework: null
    language: ko
    source: naver_datalab_dominance
    diagnostic: "Naver DataLab showed 알토스벤처스 has dominant spike-driven search volume in Korea (peak=100, others near zero). Competitor-probe on the clearly dominant brand. Captures vocabulary the engines use about the dominant player."

  - id: dm-007
    text: "What is Viki, TheVentures' AI investment analyst?"
    category: identity
    framework: null
    language: en
    source: tracxn_corpus
    diagnostic: "2025 TheVentures internal product launch (Viki, 87.5% alignment with human analysts). Specific enough to test indexing freshness with a single-answer query. If engines don't know Viki, recent TheVentures content is not indexed."

  - id: dm-008
    text: "조여준 TheVentures CIO는 누구이며 어떤 배경을 가지고 있나요?"
    category: identity
    framework: null
    language: ko
    source: bing_autocomplete_collision
    diagnostic: "Bing autocomplete: '조여준' resolves to '조여준 통역사' (a Korean interpreter of the same name) — NOT the VC. Direct disambiguation probe. Tests whether engines can distinguish Ethan from the name collision."

  - id: dm-009
    text: "Which Korean VCs invest in Korean diaspora founders in Silicon Valley?"
    category: domain
    framework: null
    language: en
    source: bing_autocomplete_null
    diagnostic: "Bing autocomplete returned ZERO suggestions for 'Korean diaspora founder' — unclaimed search space. Ethan's stated thesis has no existing search demand. Null engine result confirms white-space; non-null reveals an existing claimant to respond to."
